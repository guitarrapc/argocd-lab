name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log into GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for C# image
        id: meta-csharp
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-csharp,onlatest=true
          labels: |
            org.opencontainers.image.title=${{ github.repository }} C# API
            org.opencontainers.image.description=C# ASP.NET Core API server implementation with NativeAOT
      - name: Extract metadata for Go image
        id: meta-go
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-go,onlatest=true
          labels: |
            org.opencontainers.image.title=${{ github.repository }} Go API
            org.opencontainers.image.description=Go API server implementation
      # no cache for clean builds on release
      - name: Build and push C# image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./CSharp
          file: ./CSharp/Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-csharp.outputs.tags }}
          labels: ${{ steps.meta-csharp.outputs.labels }}
      - name: Build and push Go image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./Go
          file: ./Go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-go.outputs.tags }}
          labels: ${{ steps.meta-go.outputs.labels }}
