name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet publish ./CSharp/Api -c Release

  build-go:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Build
        run: go build -o ./Go/api ./Go/main.go

  docker:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for C# image
        id: meta-csharp
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-csharp,onlatest=true
          labels: |
            org.opencontainers.image.title=${{ github.repository }} C# API
            org.opencontainers.image.description=C# ASP.NET Core API server implementation with NativeAOT
      - name: Extract metadata for Go image
        id: meta-go
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-go,onlatest=true
          labels: |
            org.opencontainers.image.title=${{ github.repository }} Go API
            org.opencontainers.image.description=Go API server implementation
      - name: Build and push C# image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./CSharp
          file: ./CSharp/Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta-csharp.outputs.tags }}
          labels: ${{ steps.meta-csharp.outputs.labels }}
          cache-from: type=gha,scope=csharp
          cache-to: type=gha,mode=max,scope=csharp
      - name: Build and push Go image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./Go
          file: ./Go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta-go.outputs.tags }}
          labels: ${{ steps.meta-go.outputs.labels }}
          cache-from: type=gha,scope=go
          cache-to: type=gha,mode=max,scope=go

  build-complete:
    needs: [build-dotnet, build-go, docker]
    permissions: {}
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Build complete
        run: echo "Build complete"
